<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>חדשות חיות | NewsLive</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --card: #1c2128;
    --border: #30363d;
    --accent: #58a6ff;
    --accent2: #f78166;
    --text: #e6edf3;
    --muted: #8b949e;
    --tag-bg: #21262d;
    --live: #3fb950;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Arial, sans-serif; min-height: 100vh; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo { font-size: 1.5rem; font-weight: 800; color: var(--accent); letter-spacing: -0.5px; }
  .live-badge {
    display: flex; align-items: center; gap: 6px;
    background: rgba(63,185,80,0.15); border: 1px solid var(--live);
    color: var(--live); border-radius: 20px; padding: 4px 12px; font-size: 0.8rem; font-weight: 600;
  }
  .pulse { width: 8px; height: 8px; background: var(--live); border-radius: 50%; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(1.4)} }

  .update-info { color: var(--muted); font-size: 0.78rem; text-align: center; padding: 8px; }

  .categories {
    display: flex; flex-wrap: wrap; gap: 8px;
    padding: 16px 24px; background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .cat-btn {
    background: var(--tag-bg); border: 1px solid var(--border);
    color: var(--muted); padding: 6px 14px; border-radius: 20px;
    cursor: pointer; font-size: 0.85rem; transition: all .2s;
  }
  .cat-btn:hover { border-color: var(--accent); color: var(--accent); }
  .cat-btn.active { background: var(--accent); border-color: var(--accent); color: #0d1117; font-weight: 700; }

  .main { padding: 24px; max-width: 1400px; margin: 0 auto; }

  .section-title {
    font-size: 1.3rem; font-weight: 700; margin-bottom: 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-title .emoji { font-size: 1.4rem; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
    margin-bottom: 40px;
  }

  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px;
    display: flex; flex-direction: column; gap: 10px;
    transition: border-color .2s, transform .2s;
    animation: fadeIn .4s ease;
  }
  .card:hover { border-color: var(--accent); transform: translateY(-2px); }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  .card-source {
    font-size: 0.72rem; font-weight: 600; text-transform: uppercase;
    color: var(--accent2); letter-spacing: .5px;
  }
  .card-title { font-size: 0.95rem; font-weight: 600; line-height: 1.45; }
  .card-title a { color: var(--text); text-decoration: none; }
  .card-title a:hover { color: var(--accent); }
  .card-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.5; flex: 1; }
  .card-time { font-size: 0.72rem; color: var(--muted); }
  .read-more {
    display: inline-block; margin-top: 4px;
    font-size: 0.78rem; color: var(--accent);
    text-decoration: none; font-weight: 600;
  }
  .read-more:hover { text-decoration: underline; }

  .loading { text-align: center; padding: 60px; color: var(--muted); font-size: 1rem; }
  .spinner {
    width: 36px; height: 36px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin .8s linear infinite; margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .countdown {
    font-size: 0.75rem; color: var(--muted);
    display: flex; align-items: center; gap: 4px;
  }
  .countdown span { color: var(--accent); font-weight: 700; }

  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--live); color: #000; padding: 10px 24px; border-radius: 24px;
    font-weight: 700; font-size: 0.85rem; transition: transform .3s; z-index: 200;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  .no-articles { color: var(--muted); font-size: 0.9rem; padding: 20px; grid-column: 1/-1; }

  @media(max-width:600px) {
    .categories { padding: 12px 16px; }
    .main { padding: 16px; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">📰 NewsLive</div>
  <div style="display:flex;gap:16px;align-items:center">
    <div class="countdown">מתעדכן בעוד <span id="timer">5:00</span></div>
    <div class="live-badge"><div class="pulse"></div>חי</div>
  </div>
</header>

<div class="update-info" id="lastUpdate">טוען חדשות...</div>

<div class="categories" id="catBar">
  <button class="cat-btn active" onclick="filterCat('all')">🌐 הכל</button>
  {% for cat in categories %}
  <button class="cat-btn" onclick="filterCat('{{ cat }}')">{{ cat }}</button>
  {% endfor %}
</div>

<div class="main" id="newsContainer">
  <div class="loading"><div class="spinner"></div>טוען ידיעות מרחבי העולם...</div>
</div>

<div id="toast">✅ החדשות עודכנו!</div>

<script>
const CATEGORY_ICONS = {
  "עולם": "🌍", "טכנולוגיה": "💻", "מדע": "🔬", "עסקים וכלכלה": "📈",
  "ספורט": "⚽", "בריאות": "🏥", "בידור": "🎬",
  "מדיניות ופוליטיקה": "🏛️", "סביבה ואקלים": "🌱", "חינוך": "📚"
};

let allData = {};
let activeCategory = "all";
let countdown = 300;
let timerInterval;

function formatDate(str) {
  if (!str) return "";
  try {
    const d = new Date(str);
    if (isNaN(d)) return str.substring(0, 16);
    return d.toLocaleString("he-IL", { day:"2-digit", month:"2-digit", hour:"2-digit", minute:"2-digit" });
  } catch { return ""; }
}

function renderArticles(articles) {
  if (!articles || articles.length === 0)
    return '<div class="no-articles">אין ידיעות זמינות כרגע</div>';
  return articles.map(a => `
    <div class="card">
      <div class="card-source">${escHtml(a.source)}</div>
      <div class="card-title"><a href="${escHtml(a.link)}" target="_blank" rel="noopener">${escHtml(a.title)}</a></div>
      ${a.desc ? `<div class="card-desc">${escHtml(a.desc)}...</div>` : ""}
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div class="card-time">${formatDate(a.pub)}</div>
        <a class="read-more" href="${escHtml(a.link)}" target="_blank" rel="noopener">קרא עוד ›</a>
      </div>
    </div>
  `).join("");
}

function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function render() {
  const container = document.getElementById("newsContainer");
  if (activeCategory === "all") {
    let html = "";
    for (const [cat, data] of Object.entries(allData)) {
      const icon = CATEGORY_ICONS[cat] || "📌";
      html += `<div class="section-title"><span class="emoji">${icon}</span>${cat}</div>
               <div class="grid">${renderArticles(data.articles)}</div>`;
    }
    container.innerHTML = html || '<div class="loading">אין נתונים</div>';
  } else {
    const data = allData[activeCategory];
    const icon = CATEGORY_ICONS[activeCategory] || "📌";
    container.innerHTML = `<div class="section-title"><span class="emoji">${icon}</span>${activeCategory}</div>
      <div class="grid">${data ? renderArticles(data.articles) : '<div class="no-articles">טוען...</div>'}</div>`;
  }
}

function filterCat(cat) {
  activeCategory = cat;
  document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
  const label = cat === "all" ? "הכל" : cat;
  document.querySelectorAll(".cat-btn").forEach(b => {
    if (b.textContent.trim().endsWith(label)) b.classList.add("active");
  });
  render();
}

function showToast() {
  const t = document.getElementById("toast");
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

async function fetchNews(silent = false) {
  try {
    const res = await fetch("/api/news");
    const data = await res.json();
    const isFirst = Object.keys(allData).length === 0;
    allData = data;
    render();
    const now = new Date().toLocaleString("he-IL");
    document.getElementById("lastUpdate").textContent = `עודכן לאחרונה: ${now}`;
    if (!isFirst && !silent) showToast();
  } catch(e) {
    document.getElementById("lastUpdate").textContent = "שגיאה בטעינת חדשות";
  }
}

function startCountdown() {
  countdown = 300;
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    countdown--;
    const m = Math.floor(countdown / 60);
    const s = countdown % 60;
    document.getElementById("timer").textContent = `${m}:${s.toString().padStart(2,"0")}`;
    if (countdown <= 0) {
      fetchNews(false);
      countdown = 300;
    }
  }, 1000);
}

fetchNews(true);
startCountdown();
</script>
</body>
</html>
